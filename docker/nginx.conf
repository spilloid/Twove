# Dead-simple static server for the WebAssembly game bundles.
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Force .wasm to be served as application/wasm so the browser can
    # stream-compile it, regardless of the bundled mime.types version.
    # (An empty `types {}` block makes this location fall back to default_type.)
    location ~ \.wasm$ {
        types { }
        default_type application/wasm;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
